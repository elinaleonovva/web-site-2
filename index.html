<style>

  .mrow.bad select{border-color:var(--bad);background:var(--badbg)}

  .theory.show{display:block;animation:fade .3s}
  .theory b{color:#bcd0ff}

  .primary{background:linear-gradient(90deg,#6c8cff,#9b6cff);color:#fff;flex:1}
  .primary:disabled{opacity:.45;cursor:not-allowed}
  .ghost{background:#222a47;color:var(--txt)}
  .ghost:disabled{opacity:.4;cursor:not-allowed}
  .final{text-align:center;padding:30px 20px}
  .score{font-size:48px;font-weight:800;margin:10px 0}
  .score small{font-size:20px;color:var(--muted)}
  .pill{display:inline-block;background:#222a47;color:var(--muted);border-radius:20px;padding:6px 14px;font-size:13px;margin-top:8px}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:18px}
  .navwrap{margin:6px 0 4px}
  .navtoggle{width:100%;background:#222a47;color:var(--txt);border:1.5px solid var(--line);border-radius:12px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}

  .navcell.bad{border-color:var(--bad);color:var(--bad)}

<script>
const QUESTIONS = JSON.parse(document.getElementById('data').textContent);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
QUESTIONS.forEach(q=>{
  if(q.type==='match'){ q.shufMatches = shuffle([...new Set(q.matches)]); }
  else if(q.type!=='reveal'){ q.shufOpts = shuffle(q.opts.map(o=>({...o}))); }
  q.state={checked:false,sel:[],correct:false};
});
let idx=0, score=0, answered=0;
const app=document.getElementById('app');
const prog=document.getElementById('prog');
const counter=document.getElementById('counter');
const scoreLbl=document.getElementById('scoreLbl');
const N=QUESTIONS.length;

function render(){
  if(idx>=N){return renderFinal();}
  const q=QUESTIONS[idx];
  counter.textContent='Вопрос '+(idx+1)+' из '+N;
  scoreLbl.textContent='Счёт: '+score+' / '+answered;
  prog.style.width=(idx/N*100)+'%';
  let h='<div class="card"><div class="qn">Вопрос '+q.n+'</div><div class="q">'+esc(q.q)+'</div>';
  if(q.img) h+='<img class="qimg" src="'+q.img+'" alt="Схема к вопросу">';
  if(q.type==='multi') h+='<div class="hint">Выберите все правильные варианты, затем «Проверить».</div>';
  if(q.type==='match') h+='<div class="hint">Для каждого элемента выберите верное соответствие.</div>';
  if(q.type==='reveal') h+='<div class="hint">Соберите ответ самостоятельно, затем откройте правильный вариант.</div>';

  if(q.type==='reveal'){
    if(q.state.checked){
      h+='<div class="ansbox"><span class="lbl">Правильный ответ:</span> '+esc(q.answer)+'</div>';
      h+='<div class="theory show"><b>Теория:</b> '+esc(q.theory)+'</div>';
    }
  } else if(q.type==='match'){
    h+='<div id="opts">';
    q.elems.forEach((el,i)=>{
      let selv=q.state.sel[i]||'';
      let cls='mrow';
      if(q.state.checked){cls+= (selv===q.matches[i])?' ok':' bad';}
      h+='<div class="'+cls+'"><div class="el">'+esc(el)+'</div><select data-i="'+i+'" '+(q.state.checked?'disabled':'')+' onchange="pickMatch('+i+',this.value)"><option value="">— выберите —</option>';
      q.shufMatches.forEach(m=>{h+='<option '+(selv===m?'selected':'')+' value="'+escAttr(m)+'">'+esc(m)+'</option>';});
      h+='</select></div>';
    });
    h+='</div>';
  } else {
    const sq=q.type==='multi';
    h+='<div id="opts">';
    q.shufOpts.forEach((o,i)=>{
      let cls='opt'+(sq?' sq':'');
      let mark='';
      const chosen=q.state.sel.includes(i);
      if(q.state.checked){
        cls+=' locked';
        if(o.c){cls+=' ok';mark='✓';}
        else if(chosen){cls+=' bad';mark='✕';}
      } else if(chosen){cls+=' sel';mark=sq?'✓':'●';}
      h+='<div class="'+cls+'" onclick="pick('+i+')"><div class="box">'+mark+'</div><div>'+esc(o.t)+'</div></div>';
    });
    h+='</div>';
  }

  if(q.type!=='reveal' && q.state.checked){
    const v=q.state.correct?'<span class="verdict ok">✓ Верно!</span>':'<span class="verdict bad">✕ Неверно</span>';
    h+='<div class="theory show">'+v+'<br><b>Теория:</b> '+esc(q.theory)+'</div>';
  }

  h+='<div class="btns">';
  h+='<button class="ghost" onclick="prev()" '+(idx===0?'disabled':'')+'>← Назад</button>';
  if(!q.state.checked){
    if(q.type==='reveal'){
      h+='<button class="primary" onclick="reveal()">Показать ответ</button>';
    } else {
      h+='<button class="primary" id="checkBtn" onclick="check()" '+(hasSel(q)?'':'disabled')+'>Проверить</button>';
    }
  } else {
    h+='<button class="primary" onclick="next()">'+(idx===N-1?'Завершить':'Далее →')+'</button>';
  }
  h+='</div></div>';
  app.innerHTML=h;renderNav();
}
function hasSel(q){
  if(q.type==='match'){return q.elems.every((_,i)=>q.state.sel[i]);}
  if(q.type==='reveal'){return true;}
  return q.state.sel.length>0;
}
function pick(i){
  const q=QUESTIONS[idx];if(q.state.checked)return;
  if(q.type==='multi'){
    const p=q.state.sel.indexOf(i);
    if(p>=0)q.state.sel.splice(p,1);else q.state.sel.push(i);
  } else { q.state.sel=[i]; }
  render();
}
function pickMatch(i,v){
  const q=QUESTIONS[idx];if(q.state.checked)return;
  q.state.sel[i]=v;
  const btn=document.getElementById('checkBtn');
  if(btn)btn.disabled=!hasSel(q);
}
function reveal(){
  const q=QUESTIONS[idx];
  q.state.checked=true; q.state.correct=null; // открытый вопрос — не оценивается
  render();
}
function check(){
  const q=QUESTIONS[idx];
  if(!hasSel(q))return;
  let ok;
  if(q.type==='match'){
    ok=q.elems.every((_,i)=>q.state.sel[i]===q.matches[i]);
  } else {
    const correctIdx=q.shufOpts.map((o,i)=>o.c?i:-1).filter(i=>i>=0).sort((a,b)=>a-b);
    const sel=q.state.sel.slice().sort((a,b)=>a-b);
    ok=correctIdx.length===sel.length&&correctIdx.every((v,k)=>v===sel[k]);
  }
  q.state.checked=true;q.state.correct=ok;
  answered++;if(ok)score++;
  render();
}
function next(){idx++;render();}
function prev(){if(idx>0){idx--;render();}}
function renderFinal(){
  prog.style.width='100%';
  counter.textContent='Готово';scoreLbl.textContent='Счёт: '+score+' / '+answered;
  const pct=answered?Math.round(score/answered*100):0;
  let msg = pct>=90?'Отличный результат! 🎯':pct>=70?'Хорошо, но есть что повторить 💪':pct>=50?'Неплохо — стоит закрепить теорию 📚':'Стоит пройти ещё раз и почитать теорию 🔁';
  app.innerHTML='<div class="card final"><div class="qn">Результат</div>'+
    '<div class="score">'+score+'<small> / '+answered+'</small></div>'+
    '<div class="pill">'+pct+'% правильных (из вопросов с проверкой)</div>'+
    '<p style="color:var(--muted);margin-top:14px">'+msg+'</p>'+
    '<div class="btns"><button class="ghost" onclick="review()">Посмотреть ответы</button><button class="primary" onclick="restart()">Пройти заново</button></div>'+
  '</div>';
}
function review(){idx=0;render();}
function restart(){
  QUESTIONS.forEach(q=>{q.state={checked:false,sel:[],correct:false};
    if(q.type==='match')q.shufMatches=shuffle([...new Set(q.matches)]);else if(q.type!=='reveal')q.shufOpts=shuffle(q.opts.map(o=>({...o})));});
  idx=0;score=0;answered=0;render();
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function escAttr(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function goto(i){idx=i;render();}
function toggleNav(){var g=document.getElementById('navGrid');if(g)g.classList.toggle('show');}
function renderNav(){var g=document.getElementById('navGrid');if(!g)return;var s2='';for(var i=0;i<N;i++){var s=QUESTIONS[i].state;var cls='navcell';if(s.checked){if(s.correct===true)cls+=' ok';else if(s.correct===false)cls+=' bad';else cls+=' seen';}if(i===idx)cls+=' cur';s2+='<div class=\"'+cls+'\" onclick=\"goto('+i+')\">'+(i+1)+'</div>';}g.innerHTML=s2;}
render();
</script>
