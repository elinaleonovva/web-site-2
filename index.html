<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест по Unity — интерактивный</title>
<style>
  :root{--bg:#0f1220;--card:#1a1f35;--muted:#9aa3c0;--txt:#eef1fb;--acc:#6c8cff;--ok:#2ecc71;--okbg:#10311f;--bad:#ff5d6c;--badbg:#3a1620;--line:#2a3252;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0c0f1c,#111630);color:var(--txt);min-height:100vh}
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 80px}
  h1{font-size:20px;margin:6px 0 2px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .bar{height:8px;background:#232a47;border-radius:8px;overflow:hidden;margin:10px 0 4px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,#6c8cff,#9b6cff);width:0;transition:width .3s}
  .meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .qn{color:var(--acc);font-weight:700;font-size:13px;letter-spacing:.4px;text-transform:uppercase}
  .q{font-size:18px;font-weight:600;margin:8px 0 6px;line-height:1.4}
  .hint{color:var(--muted);font-size:13px;margin-bottom:12px}
  pre{background:#0c1020;border:1px solid var(--line);border-radius:10px;padding:12px;overflow:auto;font-size:13px;color:#cfe1ff;margin:10px 0}
  .opt{display:flex;align-items:flex-start;gap:10px;border:1.5px solid var(--line);background:#161b30;border-radius:12px;padding:12px 14px;margin:8px 0;cursor:pointer;transition:.15s;font-size:15px;line-height:1.35}
  .opt:hover{border-color:#46508a}
  .opt .box{flex:0 0 22px;height:22px;border-radius:50%;border:2px solid #5b6699;display:flex;align-items:center;justify-content:center;margin-top:1px;font-size:13px}
  .opt.sq .box{border-radius:6px}
  .opt.sel{border-color:var(--acc);background:#1d2547}
  .opt.sel .box{background:var(--acc);border-color:var(--acc);color:#fff}
  .opt.ok{border-color:var(--ok);background:var(--okbg)}
  .opt.ok .box{background:var(--ok);border-color:var(--ok);color:#04210f}
  .opt.bad{border-color:var(--bad);background:var(--badbg)}
  .opt.bad .box{background:var(--bad);border-color:var(--bad);color:#2a0a10}
  .opt.locked{cursor:default}
  .mrow{display:flex;gap:10px;align-items:center;margin:8px 0;flex-wrap:wrap}
  .mrow .el{flex:0 0 auto;font-weight:600;background:#161b30;border:1.5px solid var(--line);padding:8px 12px;border-radius:10px;min-width:120px}
  .mrow select{flex:1 1 220px;background:#0f1430;color:var(--txt);border:1.5px solid var(--line);border-radius:10px;padding:9px;font-size:14px}
  .mrow.ok select{border-color:var(--ok);background:var(--okbg)}
  .mrow.bad select{border-color:var(--bad);background:var(--badbg)}
  .theory{margin-top:14px;border-left:4px solid var(--acc);background:#141a31;border-radius:0 12px 12px 0;padding:12px 14px;font-size:14.5px;line-height:1.5;display:none}
  .theory.show{display:block;animation:fade .3s}
  .theory b{color:#bcd0ff}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .verdict{font-weight:700;margin-bottom:6px}
  .verdict.ok{color:var(--ok)}.verdict.bad{color:var(--bad)}
  .btns{display:flex;gap:10px;margin-top:18px}
  button{font-family:inherit;font-size:15px;font-weight:600;border:none;border-radius:12px;padding:13px 18px;cursor:pointer;transition:.15s}
  .primary{background:linear-gradient(90deg,#6c8cff,#9b6cff);color:#fff;flex:1}
  .primary:disabled{opacity:.45;cursor:not-allowed}
  .ghost{background:#222a47;color:var(--txt)}
  .ghost:disabled{opacity:.4;cursor:not-allowed}
  .final{text-align:center;padding:30px 20px}
  .score{font-size:48px;font-weight:800;margin:10px 0}
  .score small{font-size:20px;color:var(--muted)}
  .pill{display:inline-block;background:#222a47;color:var(--muted);border-radius:20px;padding:6px 14px;font-size:13px;margin-top:8px}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Тест по Unity</h1>
  <div class="sub">Выбери ответ и нажми «Проверить» — теория появится после проверки.</div>
  <div class="bar"><i id="prog"></i></div>
  <div class="meta"><span id="counter"></span><span id="scoreLbl"></span></div>
  <div id="app"></div>
</div>
<script id="data" type="application/json">[{"n": 1, "type": "single", "q": "Какой компонент воспроизводит звук?", "code": "", "opts": [{"t": "SoundPlayer", "c": false}, {"t": "MusicPlayer", "c": false}, {"t": "AudioSource", "c": true}, {"t": "AudioListener", "c": false}], "theory": "AudioSource — компонент, который проигрывает аудиоклип (AudioClip) в сцене. AudioListener (обычно на камере) только «слышит» звук, а Audio Mixer управляет группами. Источник звука — именно AudioSource."}, {"n": 2, "type": "single", "q": "Какой компонент заставляет объект двигаться по NavMesh?", "code": "", "opts": [{"t": "NavMeshAgent", "c": true}, {"t": "NavWalker", "c": false}, {"t": "AIController", "c": false}, {"t": "PathFinder", "c": false}], "theory": "NavMeshAgent автоматически перемещает объект по запечённому NavMesh: строит путь к цели (SetDestination) и обходит препятствия. Остальные названия в Unity не существуют."}, {"n": 3, "type": "single", "q": "Что такое Build Settings в Unity?", "code": "", "opts": [{"t": "Система частиц", "c": false}, {"t": "Компонент UI", "c": false}, {"t": "Настройки сборки проекта для различных платформ", "c": true}, {"t": "Источник звука", "c": false}], "theory": "Build Settings — окно настроек сборки: выбор платформы, список сцен в билде и параметры экспорта. К частицам, UI или звуку отношения не имеет."}, {"n": 4, "type": "single", "q": "Что такое Prefab в Unity?", "code": "", "opts": [{"t": "Вид шейдера", "c": false}, {"t": "Шаблон игрового объекта для многократного использования", "c": true}, {"t": "Тип анимации", "c": false}, {"t": "Компонент физики", "c": false}], "theory": "Prefab — сохранённый шаблон GameObject со всеми компонентами и настройками. Из него создают множество одинаковых экземпляров (Instantiate) и меняют их централизованно через сам префаб."}, {"n": 5, "type": "single", "q": "Что такое NavMesh в Unity?", "code": "", "opts": [{"t": "Компонент UI", "c": false}, {"t": "Система поиска пути для AI-агентов", "c": true}, {"t": "Источник звука", "c": false}, {"t": "Система частиц", "c": false}], "theory": "NavMesh — «сетка навигации»: запечённая проходимая поверхность сцены, по которой ИИ-агенты (NavMeshAgent) находят путь и обходят препятствия."}, {"n": 6, "type": "single", "q": "Какой метод вызывается при столкновении объектов?", "code": "", "opts": [{"t": "OnBump()", "c": false}, {"t": "OnTouch()", "c": false}, {"t": "OnCollisionEnter()", "c": true}, {"t": "OnEnter()", "c": false}], "theory": "OnCollisionEnter() вызывается, когда два коллайдера (с Rigidbody) физически сталкиваются. Для триггеров аналог — OnTriggerEnter()."}, {"n": 7, "type": "single", "q": "Как создать новый материал?", "code": "", "opts": [{"t": "В меню File → New Material", "c": false}, {"t": "Через Terrain Tools", "c": false}, {"t": "В компоненте Renderer", "c": false}, {"t": "В папке Assets → Create → Material", "c": true}], "theory": "Материал создаётся в окне Project: Assets → Create → Material (или ПКМ по папке → Create → Material). В меню File такого пункта нет."}, {"n": 8, "type": "single", "q": "Что такое Audio Mixer?", "code": "", "opts": [{"t": "Инструмент для управления группами звуков", "c": true}, {"t": "Эффект реверберации", "c": false}, {"t": "Компонент для воспроизведения", "c": false}, {"t": "Тип аудиофайла", "c": false}], "theory": "Audio Mixer — инструмент маршрутизации и микширования звука: группы каналов, громкости, эффекты (реверберация и др.). Сам по себе аудио он не воспроизводит."}, {"n": 9, "type": "single", "q": "Какой класс отвечает за работу с аудиодорожками?", "code": "", "opts": [{"t": "Animator", "c": false}, {"t": "Rigidbody", "c": false}, {"t": "Collider", "c": false}, {"t": "AudioSource", "c": true}], "theory": "За воспроизведение и работу с аудиоклипом отвечает AudioSource. Animator — анимация, Rigidbody — физика, Collider — столкновения."}, {"n": 10, "type": "single", "q": "Как изменить высоту Terrain?", "code": "", "opts": [{"t": "Инструментом Raise/Lower Terrain", "c": true}, {"t": "Инструментом Smooth", "c": false}, {"t": "Скриптом, изменяя scale.y", "c": false}, {"t": "Через параметр Height в Inspector", "c": false}], "theory": "Высоту террейна меняют кистью Raise/Lower Terrain в инструментах Terrain. Smooth лишь сглаживает, scale.y рельеф не меняет, отдельного поля Height для рельефа в инспекторе нет."}, {"n": 11, "type": "multi", "q": "Какие возможности предоставляет система событий в Unity?", "code": "", "opts": [{"t": "Обработка пользовательского ввода", "c": true}, {"t": "Редактирование шейдеров", "c": false}, {"t": "Отслеживание столкновений", "c": false}, {"t": "Создание пользовательских событий", "c": true}], "theory": "Система событий (Event System / UnityEvents) обрабатывает пользовательский ввод (клики, нажатия UI) и позволяет создавать и вызывать собственные события. Шейдеры и физические столкновения к ней не относятся."}, {"n": 12, "type": "multi", "q": "Какие методы жизненного цикла Unity вызываются каждый кадр?", "code": "", "opts": [{"t": "OnDestroy()", "c": false}, {"t": "Update()", "c": true}, {"t": "LateUpdate()", "c": true}, {"t": "Start()", "c": false}], "theory": "Каждый кадр вызываются Update() и LateUpdate() (Late — после всех Update в кадре). Start() выполняется один раз перед первым кадром, OnDestroy() — при уничтожении объекта."}, {"n": 13, "type": "multi", "q": "Какие типы коллайдеров используются в Unity для объёмных объектов?", "code": "", "opts": [{"t": "MeshCollider", "c": true}, {"t": "SphereCollider", "c": true}, {"t": "BoxCollider", "c": true}, {"t": "CircleCollider2D", "c": false}], "theory": "Для объёмных (3D) объектов используют MeshCollider, SphereCollider и BoxCollider. CircleCollider2D — это двумерный коллайдер."}, {"n": 14, "type": "multi", "q": "Какие из перечисленных функций вызываются автоматически при взаимодействии?", "code": "", "opts": [{"t": "* OnTriggerStay()", "c": true}, {"t": "* OnTriggerEnter()", "c": true}, {"t": "* OnTriggerExit()", "c": true}, {"t": "* OnCollisionEnter()", "c": true}], "theory": "При взаимодействии автоматически вызываются OnTriggerEnter/Stay/Exit (когда у коллайдера включён Is Trigger) и OnCollisionEnter (при обычном столкновении с Rigidbody). Все четыре — стандартные коллбэки Unity."}, {"n": 15, "type": "match", "q": "Соотнесите компоненты Unity с их ролью в освещении", "elems": ["Light", "Lightmap", "Light Probe", "Reflection Probe"], "matches": ["Основной источник света (направленный, точечный, прожектор)", "Заранее рассчитанная (запечённая) текстура освещения для статичных объектов", "Хранит информацию о косвенном освещении для динамических объектов", "Захватывает окружение для реалистичных отражений"], "theory": "Light даёт прямой свет (направленный, точечный, прожектор). Lightmap, Light Probe и Reflection Probe — это заранее рассчитанные (запечённые) данные: карта освещения для статичных объектов, непрямое освещение для динамических и отражения окружения соответственно."}, {"n": 16, "type": "match", "q": "Соотнесите типы коллайдеров в 2D Unity с их формами", "elems": ["BoxCollider2D", "CircleCollider2D", "EdgeCollider2D", "PolygonCollider2D"], "matches": ["Объекты с прямоугольной формой (персонажи, платформы)", "Шарообразные объекты (мячи, пули)", "Сложные поверхности (например, рельеф уровня)", "Объекты с произвольной формой (например, спрайт камня)"], "theory": "Форму 2D-коллайдера подбирают под форму объекта для точных и дешёвых столкновений: прямоугольник — Box, круг — Circle, ломаная/рельеф — Edge, произвольный контур спрайта — Polygon."}, {"n": 17, "type": "match", "q": "Соотнесите компоненты навигации Unity с их функциями", "elems": ["NavMesh", "NavMeshAgent", "NavMeshObstacle", "NavMeshSurface"], "matches": ["Карта проходимости сцены", "ИИ для перемещения объектов", "Динамические препятствия", "Генератор навигации в реальном времени"], "theory": "NavMesh — это карта проходимости; NavMeshAgent перемещается по ней; NavMeshObstacle создаёт динамические препятствия; NavMeshSurface отвечает за генерацию (запекание) навигации, в том числе в реальном времени."}, {"n": 18, "type": "match", "q": "Соотнесите понятия из XR-разработки в Unity", "elems": ["XR Interaction Toolkit", "Oculus Integration", "OpenXR", "XR Plugin Management"], "matches": ["Компоненты для взаимодействия в XR", "Набор инструментов для Oculus", "Стандарт API для VR/AR-устройств", "Управление VR/AR-плагинами"], "theory": "В XR-разработке: XR Interaction Toolkit даёт компоненты взаимодействия, Oculus Integration — инструменты под устройства Oculus, OpenXR — открытый стандарт API для VR/AR, а XR Plugin Management управляет подключёнными XR-плагинами."}, {"n": 19, "type": "single", "q": "Как называется область, в которой размещается интерфейс пользователя в Unity?", "code": "", "opts": [{"t": "Transform", "c": false}, {"t": "GameObject", "c": false}, {"t": "Canvas", "c": true}, {"t": "Scene", "c": false}], "theory": "Интерфейс пользователя размещается в Canvas — корневом компоненте, внутри которого живут все UI-элементы. Transform, GameObject и Scene — более общие понятия."}, {"n": 20, "type": "single", "q": "Как сделать объект препятствием для NavMesh?", "code": "", "opts": [{"t": "Установить isStatic", "c": true}, {"t": "Удалить Rigidbody", "c": false}, {"t": "true", "c": false}, {"t": "Добавить компонент Obstacle", "c": false}, {"t": "Добавить слой в Bake", "c": false}], "theory": "Чтобы статичный объект стал препятствием для навигации, его помечают как Navigation Static (isStatic) и перезапекают NavMesh — объект «вырезается» из проходимой области. Для динамических препятствий служит компонент NavMeshObstacle."}, {"n": 21, "type": "single", "q": "Что обозначает Time.deltaTime?", "code": "", "opts": [{"t": "Общее время игры", "c": false}, {"t": "Время, прошедшее с последнего кадра; используется для плавности анимаций", "c": true}, {"t": "Время воспроизведения аудио", "c": false}, {"t": "Время загрузки сцены", "c": false}], "theory": "Time.deltaTime — время (в секундах) между предыдущим и текущим кадром. Умножая скорость на него, движение и анимации становятся независимыми от частоты кадров (FPS)."}, {"n": 22, "type": "single", "q": "Что такое Rigidbody2D?", "code": "", "opts": [{"t": "Источник света", "c": false}, {"t": "Компонент для физики 2D-объектов", "c": true}, {"t": "Компонент UI", "c": false}, {"t": "Компонент анимации", "c": false}], "theory": "Rigidbody2D — компонент 2D-физики: масса, гравитация, силы и столкновения в плоскости. Для трёхмерной физики используется Rigidbody."}, {"n": 23, "type": "single", "q": "Какой компонент добавляет объектам физические свойства?", "code": "", "opts": [{"t": "Rigidbody", "c": true}, {"t": "PhysicsRenderer", "c": false}, {"t": "Force", "c": false}, {"t": "Collider", "c": false}], "theory": "Физические свойства (масса, гравитация, реакция на силы) даёт Rigidbody. Collider лишь задаёт форму столкновения, но без Rigidbody объект не участвует в физической динамике."}, {"n": 24, "type": "single", "q": "Что такое SRP (Scriptable Render Pipeline)?", "code": "", "opts": [{"t": "Менеджер ресурсов", "c": false}, {"t": "Система частиц", "c": false}, {"t": "Тип шейдера", "c": false}, {"t": "Кастомизируемый конвейер рендеринга", "c": true}], "theory": "SRP (Scriptable Render Pipeline) — настраиваемый конвейер рендеринга. На нём построены URP и HDRP, позволяющие управлять процессом отрисовки через C#."}, {"n": 25, "type": "multi", "q": "Какие типы анимаций поддерживаются Unity?", "code": "", "opts": [{"t": "Скелетная анимация (Skeletal animation)", "c": true}, {"t": "Текстовая анимация", "c": false}, {"t": "Blend Trees", "c": true}, {"t": "Анимация по ключевым кадрам (Keyframe animation)", "c": true}], "theory": "Unity поддерживает скелетную анимацию (риг с костями), Blend Trees (смешивание анимаций по параметрам) и покадровую (keyframe) анимацию. «Текстовой анимации» как типа не существует."}, {"n": 26, "type": "multi", "q": "Какие свойства доступны у компонента Rigidbody в Unity?", "code": "", "opts": [{"t": "Drag", "c": true}, {"t": "Mass", "c": true}, {"t": "Color", "c": false}, {"t": "UseGravity", "c": true}], "theory": "У Rigidbody есть свойства Mass (масса), Drag (сопротивление среды) и UseGravity (гравитация). Color к физике не относится — это свойство материала."}, {"n": 27, "type": "single", "q": "Что делает следующий скрипт?", "code": "scoreText.color = Color.red;", "opts": [{"t": "Меняет цвет текста на красный", "c": true}, {"t": "Меняет размер шрифта", "c": false}, {"t": "Отключает текст", "c": false}, {"t": "Изменяет позицию текста", "c": false}], "theory": "scoreText.color = Color.red; задаёт красный цвет текстовому элементу. Размер шрифта, видимость и позиция управляются другими свойствами."}, {"n": 28, "type": "single", "q": "Что делает следующий скрипт?", "code": "button.onClick.AddListener(MyFunction);", "opts": [{"t": "Удаляет кнопку", "c": false}, {"t": "Добавляет метод MyFunction в список вызовов по нажатию кнопки", "c": true}, {"t": "Отключает кнопку", "c": false}, {"t": "Меняет текст кнопки", "c": false}], "theory": "button.onClick.AddListener(MyFunction); подписывает метод MyFunction на событие нажатия — при клике он будет вызван. Слушателей можно добавить несколько."}, {"n": 29, "type": "single", "q": "Что делает следующий скрипт?", "code": "audioSource.Pause();\naudioSource.UnPause();", "opts": [{"t": "UnPause останавливает", "c": false}, {"t": "Пауза удаляет аудио", "c": false}, {"t": "Pause приостанавливает, UnPause продолжает воспроизведение", "c": true}, {"t": "Пауза останавливает навсегда", "c": false}], "theory": "Pause() приостанавливает воспроизведение с сохранением позиции, UnPause() продолжает с того же места. (Stop() полностью останавливает и сбрасывает в начало.)"}, {"n": 30, "type": "single", "q": "Для чего используется метод Mathf.Clamp?", "code": "", "opts": [{"t": "Увеличивает значение", "c": false}, {"t": "Ограничивает значение в заданном диапазоне", "c": true}, {"t": "Сглаживает движение камеры", "c": false}, {"t": "Меняет положение объекта", "c": false}], "theory": "Mathf.Clamp(value, min, max) ограничивает значение диапазоном [min, max]: меньше min → min, больше max → max. Удобно для здоровья, скорости, громкости и т.п."}, {"n": 31, "type": "single", "q": "Как сделать взрыв в системе частиц?", "code": "", "opts": [{"t": "Увеличить Lifetime", "c": false}, {"t": "Использовать Burst emission (одноразовый выброс большого количества частиц)", "c": true}, {"t": "Добавить Force Field", "c": false}, {"t": "Настроить Noise", "c": false}], "theory": "Эффект взрыва частиц делают через Burst в модуле Emission — единовременный выброс большого количества частиц в заданный момент времени."}, {"n": 32, "type": "multi", "q": "Какие способы взаимодействия объектов поддерживаются в Unity?", "code": "", "opts": [{"t": "Событийные системы (например, UnityEvents)", "c": true}, {"t": "Через ссылки на другие объекты (прямое присвоение в Inspector)", "c": true}, {"t": "Через HTTP-запросы по умолчанию", "c": false}, {"t": "Через вызовы методов компонентов (GetComponent и вызов методов)", "c": true}], "theory": "Объекты взаимодействуют через события (UnityEvents), прямые ссылки в инспекторе и вызовы методов компонентов (GetComponent + вызов метода). HTTP-запросы по умолчанию для этого не применяются."}, {"n": 33, "type": "single", "q": "Для чего используется Layer Mask?", "code": "", "opts": [{"t": "Фильтрация объектов для взаимодействия, например в столкновениях или камере", "c": true}, {"t": "Хранение текстур и материалов объекта", "c": false}, {"t": "Управление громкостью звука", "c": false}, {"t": "Создание анимационных переходов", "c": false}], "theory": "Layer Mask — битовая маска слоёв, фильтрующая, какие объекты участвуют во взаимодействии: например, в Raycast, в столкновениях или в том, что видит и рендерит камера (Culling Mask)."}, {"n": 34, "type": "match", "q": "Соотнесите понятия из системы частиц Unity", "elems": ["Particle Emitter", "Particle Renderer", "Particle System", "Particle Animator"], "matches": ["Источник частиц", "Отрисовка частиц", "Основной компонент, управляющий поведением", "Устаревший компонент для анимации (не используется в новых версиях)"], "theory": "В старой терминологии частиц Emitter — источник, Renderer — отрисовка, Animator — анимация (устаревший компонент), а Particle System — основной управляющий компонент. В современных версиях всё объединено в компоненте Particle System (Shuriken)."}, {"n": 35, "type": "single", "q": "Что делает скрипт canvasGroup.alpha = 0.5f;?", "code": "", "opts": [{"t": "Устанавливает прозрачность элемента на 50%", "c": true}, {"t": "Увеличивает размер элемента вдвое", "c": false}, {"t": "Поворачивает элемент на 50 градусов", "c": false}, {"t": "Полностью удаляет элемент со сцены", "c": false}], "theory": "canvasGroup.alpha = 0.5f; задаёт прозрачность всей UI-группы на 50% (0 — полностью прозрачно, 1 — непрозрачно). CanvasGroup управляет прозрачностью и интерактивностью группы элементов сразу."}, {"n": 36, "type": "match", "q": "Соотнесите типы материалов в Unity", "elems": ["Unlit", "Legacy", "Standard", "Transparent"], "matches": ["Материал без освещения", "Устаревший материал", "Универсальный PBR-материал", "Материал с прозрачностью"], "theory": "Типы материалов: Unlit — без расчёта освещения, Legacy — устаревший, Standard — универсальный PBR-материал, Transparent — с поддержкой прозрачности."}, {"n": 37, "type": "single", "q": "Что будет, если Rigidbody у объекта настроен как Kinematic?", "code": "", "opts": [{"t": "Объект не будет подвержен физике, но его можно двигать вручную", "c": true}, {"t": "Объект полностью подчиняется гравитации и физике", "c": false}, {"t": "Объект становится невидимым", "c": false}, {"t": "Объект автоматически удаляется со сцены", "c": false}], "theory": "Если Rigidbody — Kinematic, объект не реагирует на физику (силы, гравитация и столкновения его не двигают), но его можно перемещать вручную через скрипт или Transform. Часто используется для движущихся платформ."}, {"n": 38, "type": "single", "q": "Что делает скрипт audioSource.playOnAwake = true;?", "code": "", "opts": [{"t": "Аудио будет автоматически воспроизводиться при активации объекта", "c": true}, {"t": "Аудио нужно запускать вручную из скрипта", "c": false}, {"t": "Аудио воспроизводится один раз и удаляется", "c": false}, {"t": "Звук отключается при старте сцены", "c": false}], "theory": "audioSource.playOnAwake = true; означает, что звук начнёт играть автоматически при активации объекта. При false звук нужно запускать вручную через Play()."}, {"n": 39, "type": "match", "q": "Соотнесите методы работы с навигацией Unity", "elems": ["Stop()", "Warp()", "SetDestination()", "Resume()"], "matches": ["Останавливает движение агента", "Телепортирует агента к указанной позиции", "Задаёт цель движения для NavMeshAgent", "Возобновляет движение агента"], "theory": "Методы NavMeshAgent: Stop() останавливает движение, Resume() возобновляет, Warp() мгновенно телепортирует агента к позиции, SetDestination() задаёт цель пути."}, {"n": 40, "type": "multi", "q": "Какие задачи выполняет Profiler в Unity?", "code": "", "opts": [{"t": "Отслеживание утечек памяти", "c": true}, {"t": "Анализ производительности игры", "c": true}, {"t": "Управление UI-элементами", "c": false}, {"t": "Увеличение частоты кадров", "c": false}], "theory": "Profiler анализирует производительность: нагрузку CPU/GPU, использование памяти, утечки и частоту кадров — показывает «узкие места». UI он не управляет и FPS сам не повышает."}, {"n": 41, "type": "single", "q": "Какой метод отвечает за обновление физики в Unity?", "code": "", "opts": [{"t": "FixedUpdate() — вызывается с фиксированным интервалом для расчётов физики", "c": true}, {"t": "Update()", "c": false}, {"t": "LateUpdate()", "c": false}, {"t": "Start()", "c": false}], "theory": "Физика обновляется в FixedUpdate() — он вызывается с фиксированным шагом (по умолчанию 0.02 с) синхронно с физическим движком. Силы к Rigidbody применяют именно здесь."}, {"n": 42, "type": "single", "q": "Какой метод вызывается после Update() для финализации логики?", "code": "", "opts": [{"t": "LateUpdate() — используется для постобработки, например следования камеры за объектом", "c": true}, {"t": "FixedUpdate()", "c": false}, {"t": "Awake()", "c": false}, {"t": "OnDestroy()", "c": false}], "theory": "LateUpdate() вызывается после всех Update() в кадре — удобно для логики, зависящей от уже обновлённых объектов, например для следования камеры за персонажем."}, {"n": 43, "type": "multi", "q": "Какие из перечисленных инструментов используются для создания VR-приложений в Unity?", "code": "", "opts": [{"t": "XR Plugin Management", "c": true}, {"t": "RSVO", "c": false}, {"t": "Sprite Renderer", "c": false}, {"t": "OpenXR", "c": true}], "theory": "Для VR в Unity используют XR Plugin Management (управление XR-плагинами) и OpenXR (открытый стандарт API для VR/AR). Sprite Renderer — для 2D, а «RSVO» не существует."}, {"n": 44, "type": "single", "q": "Что делает Dynamic Batching?", "code": "", "opts": [{"t": "Автоматически объединяет похожие меши (оптимизация рендеринга движущихся объектов)", "c": true}, {"t": "Сжимает текстуры при импорте", "c": false}, {"t": "Управляет очередью загрузки сцен", "c": false}, {"t": "Кэширует звуковые файлы", "c": false}], "theory": "Dynamic Batching автоматически объединяет небольшие движущиеся меши с одинаковым материалом в один вызов отрисовки, снижая число draw calls."}, {"n": 45, "type": "single", "q": "Какой компонент есть у любого GameObject?", "code": "", "opts": [{"t": "Transform (базовый компонент всех объектов)", "c": true}, {"t": "Rigidbody", "c": false}, {"t": "Collider", "c": false}, {"t": "MeshRenderer", "c": false}], "theory": "Transform есть у любого GameObject — он хранит позицию, поворот и масштаб. Остальные компоненты (Rigidbody, Collider, Renderer) добавляются по необходимости."}, {"n": 46, "type": "single", "q": "Как уменьшить количество draw calls?", "code": "", "opts": [{"t": "Использовать атласы текстур", "c": true}, {"t": "Увеличить количество источников света", "c": false}, {"t": "Назначать отдельный материал каждому объекту", "c": false}, {"t": "Отключить Occlusion Culling", "c": false}], "theory": "Число draw calls снижают, объединяя объекты и материалы: атласы текстур позволяют использовать один материал для многих объектов, что включает батчинг. Лишние материалы и источники света, наоборот, увеличивают вызовы."}, {"n": 47, "type": "single", "q": "Что такое Trigger в Collider?", "code": "", "opts": [{"t": "Объект становится нематериальным, но регистрирует столкновения", "c": true}, {"t": "Коллайдер, полностью блокирующий движение объектов", "c": false}, {"t": "Компонент для воспроизведения звука", "c": false}, {"t": "Источник физической силы", "c": false}], "theory": "Если у Collider включён Is Trigger, объект перестаёт физически блокировать другие (становится «нематериальным»), но продолжает регистрировать пересечения через OnTriggerEnter/Stay/Exit."}, {"n": 48, "type": "multi", "q": "Какие методы используются для обработки пользовательского ввода мыши?", "code": "", "opts": [{"t": "Input.GetTouch()", "c": false}, {"t": "Input.GetMouseButtonUp()", "c": true}, {"t": "Input.GetMouseButton()", "c": true}, {"t": "Input.GetMouseButtonDown()", "c": true}], "theory": "Ввод мышью: Input.GetMouseButtonDown() (нажатие в этом кадре), GetMouseButton() (удержание), GetMouseButtonUp() (отпускание). Input.GetTouch() — для сенсорного экрана."}, {"n": 49, "type": "multi", "q": "Какие методы можно использовать для управления звуком в Unity?", "code": "", "opts": [{"t": "Object.Play()", "c": false}, {"t": "AudioSource.Pause()", "c": true}, {"t": "AudioSource.Play()", "c": true}, {"t": "AudioNewType.volume", "c": false}], "theory": "Звуком управляют методы компонента AudioSource: Play() (запуск) и Pause() (пауза). Object.Play() и AudioNewType.volume — несуществующие конструкции."}, {"n": 50, "type": "match", "q": "Соотнесите типы материалов Unity с их особенностями", "elems": ["Legacy Shader", "Transparent Shader", "Unlit Shader", "Standard Shader"], "matches": ["Шейдер без поддержки PBR", "Шейдер с поддержкой прозрачности", "Шейдер без освещения, только цвет и текстура", "Универсальный шейдер с освещением и отражениями"], "theory": "Шейдеры: Legacy — без поддержки PBR, Transparent — с прозрачностью, Unlit — без освещения (только цвет/текстура), Standard — универсальный с освещением и отражениями."}, {"n": 51, "type": "single", "q": "Как синхронизировать позицию мультиплеерных объектов?", "code": "", "opts": [{"t": "Используя NetworkTransform", "c": true}, {"t": "Через сохранение в PlayerPrefs", "c": false}, {"t": "Используя только локальный Transform", "c": false}, {"t": "С помощью компонента AudioSource", "c": false}], "theory": "Позицию объектов в мультиплеере синхронизируют компонентом NetworkTransform — он автоматически передаёт трансформ (позицию/поворот) между сервером и клиентами."}, {"n": 52, "type": "single", "q": "Что такое NavMesh?", "code": "", "opts": [{"t": "Карта навигации для ИИ", "c": true}, {"t": "Система частиц", "c": false}, {"t": "Тип материала для рендеринга", "c": false}, {"t": "Компонент пользовательского интерфейса", "c": false}], "theory": "NavMesh — карта проходимости (навигации) сцены, по которой ИИ находит путь и обходит препятствия."}, {"n": 53, "type": "single", "q": "Что делает следующий скрипт?", "code": "agent.isStopped = true;", "opts": [{"t": "Останавливает движение NPC", "c": true}, {"t": "Удаляет агента со сцены", "c": false}, {"t": "Ускоряет движение агента", "c": false}, {"t": "Телепортирует агента в начало пути", "c": false}], "theory": "agent.isStopped = true; ставит NavMeshAgent на паузу — он прекращает движение к цели, сохраняя рассчитанный путь. Значение false возобновляет движение."}, {"n": 54, "type": "single", "q": "Как в Unity регулируется количество создаваемых частиц?", "code": "", "opts": [{"t": "Настройкой параметров Emission в Particle System", "c": true}, {"t": "Изменением масштаба (scale) объекта", "c": false}, {"t": "Настройкой компонента Rigidbody", "c": false}, {"t": "Через параметр Mass", "c": false}], "theory": "Количество создаваемых частиц регулируют в модуле Emission системы частиц: Rate over Time/Distance и Bursts. Масштаб объекта и Rigidbody на число частиц не влияют."}, {"n": 55, "type": "single", "q": "Что произойдёт, если камера исключит слой Environment из маски слоёв?", "code": "", "opts": [{"t": "Объекты на слое Environment не будут видны камере", "c": true}, {"t": "Объекты на слое будут подсвечены", "c": false}, {"t": "Объекты потеряют свои коллайдеры", "c": false}, {"t": "Сцена не запустится", "c": false}], "theory": "Если камера исключает слой из Culling Mask, объекты этого слоя ею не отрисовываются (становятся для неё невидимыми), хотя физически остаются в сцене."}, {"n": 56, "type": "match", "q": "Соотнесите методы оптимизации производительности Unity", "elems": ["Occlusion Culling", "LOD (Level of Detail)", "Static Batching", "Dynamic Batching"], "matches": ["Исключение невидимых объектов из рендеринга", "Использование упрощённых моделей на расстоянии", "Объединение неподвижных объектов для оптимизации", "Объединение движущихся объектов с похожими материалами"], "theory": "Методы оптимизации: Occlusion Culling исключает невидимые объекты из рендера, LOD подменяет модели упрощёнными на расстоянии, Static Batching объединяет неподвижные объекты, Dynamic Batching — движущиеся с похожими материалами."}, {"n": 57, "type": "match", "q": "Соотнесите UI-компоненты Unity с их функциями", "elems": ["Button", "Canvas", "Text"], "matches": ["Элемент кнопки для взаимодействия", "Контейнер для UI-элементов", "Отображение текстовой информации"], "theory": "Базовые UI-элементы: Canvas — контейнер для всего интерфейса, Button — кнопка для взаимодействия, Text — отображение текстовой информации."}, {"n": 58, "type": "match", "q": "Соотнесите типы материалов Unity с их характеристиками", "elems": ["Standard Shader", "Unit Shader", "Parallax Shader", "Transparent Shader"], "matches": ["Универсальный шейдер с освещением и отражениями", "Шейдер без освещения, только цвет и текстура (написание сохранено как в источнике)", "Шейдер с эффектом параллакса", "Шейдер с поддержкой прозрачности"], "theory": "Шейдеры: Standard — универсальный с освещением и отражениями; Unlit (в источнике «Unit») — без освещения, только цвет и текстура; Parallax — даёт эффект параллакса (псевдо-глубину рельефа); Transparent — с прозрачностью."}, {"n": 59, "type": "multi", "q": "Какие компоненты UI входят в стандартный набор Unity?", "code": "", "opts": [{"t": "Canvas", "c": true}, {"t": "Button", "c": true}, {"t": "Rigidbody", "c": false}, {"t": "Text", "c": true}], "theory": "В стандартный UI Unity входят Canvas (контейнер интерфейса), Button (кнопка) и Text (текст). Rigidbody — компонент физики, а не UI."}, {"n": 60, "type": "multi", "q": "Какие функции доступны в стандартном UI Canvas?", "code": "", "opts": [{"t": "Collider", "c": false}, {"t": "Button", "c": true}, {"t": "Toggle", "c": true}, {"t": "Slider", "c": true}], "theory": "Среди интерактивных UI-элементов Canvas есть Button, Toggle и Slider. Collider к UI не относится — это компонент физики."}, {"n": 61, "type": "multi", "q": "Какие свойства можно изменить у материала в Unity?", "code": "", "opts": [{"t": "color", "c": true}, {"t": "mainTexture", "c": true}, {"t": "position", "c": false}, {"t": "shader", "c": true}], "theory": "У материала можно менять color (цвет), mainTexture (основную текстуру) и shader (шейдер). position — свойство Transform, а не материала."}, {"n": 62, "type": "single", "q": "Что такое Normal Map?", "code": "", "opts": [{"t": "Текстура для прозрачности", "c": false}, {"t": "Текстура, имитирующая рельеф", "c": true}, {"t": "Текстура для анимации", "c": false}, {"t": "Текстура с цветом", "c": false}], "theory": "Normal Map — карта нормалей: текстура, имитирующая мелкий рельеф (выпуклости и впадины) за счёт изменения освещения, без увеличения числа полигонов."}, {"n": 63, "type": "single", "q": "Что делает следующий скрипт?", "code": "audioSource.playOnAwake = true;", "opts": [{"t": "Аудио будет автоматически воспроизводиться при активации объекта", "c": true}, {"t": "Аудио нужно запускать вручную", "c": false}, {"t": "Аудио не будет воспроизводиться", "c": false}, {"t": "Аудио удаляется при старте", "c": false}], "theory": "audioSource.playOnAwake = true; — звук запустится автоматически при активации объекта. При false его нужно включать вручную методом Play()."}, {"n": 64, "type": "single", "q": "Что необходимо сделать, чтобы корректно определить isGrounded?", "code": "void Jump()\n{\n    if (isGrounded)\n        rb.AddForce(Vector3.up * jumpForce);\n}", "opts": [{"t": "Использовать Input.GetKey()", "c": false}, {"t": "Проверять касание земли с помощью Raycast или Collider", "c": true}, {"t": "Всегда считать, что isGrounded = true", "c": false}, {"t": "Добавить Rigidbody к земле", "c": false}], "theory": "Корректно определить isGrounded можно проверкой касания земли: лучом Raycast вниз или проверкой коллайдера (OnCollision/перекрытие). Жёстко задавать isGrounded = true нельзя — теряется логика."}, {"n": 65, "type": "single", "q": "Что делает следующий скрипт?", "code": "if (Input.GetKeyDown(KeyCode.Space) && isGrounded)\n    rb.AddForce(Vector3.up * jumpForce, ForceMode.Impulse);", "opts": [{"t": "Переключает камеру", "c": false}, {"t": "Не даёт персонажу прыгать в воздухе несколько раз", "c": true}, {"t": "Создаёт новый игровой объект каждый кадр", "c": false}, {"t": "Останавливает воспроизведение звука", "c": false}], "theory": "Условие if (GetKeyDown(Space) && isGrounded) разрешает прыжок только когда персонаж на земле, поэтому он не сможет прыгать повторно в воздухе (исключаются «двойные» прыжки)."}, {"n": 66, "type": "single", "q": "Что делает следующий код?", "code": "gameObject.layer = LayerMask.NameToLayer(\"Player\");", "opts": [{"t": "Назначает объекту слой с именем Player", "c": true}, {"t": "Создаёт новый слой", "c": false}, {"t": "Переим  Shader (шейдеры), Particle System (частицы) и Post Processing (постобработку изображения). NavMeshAgent относится к навигации, а не к эффектам."}, {"n": 71, "type": "multi", "q": "Какие методы позволяют создавать эффекты частиц в Unity?", "code": "", "opts": [{"t": "ParticleSystem.Play()", "c": true}, {"t": "ParticleSystem.Emit()", "c": true}, {"t": "ParticleSystem.Destroy()", "c": false}, {"t": "ParticleSystem.Render()", "c": false}], "theory": "Частицами управляют методы ParticleSystem: Play() (запуск системы) и Emit() (ручной выброс заданного числа частиц). Destroy() и Render() для генерации частиц не используются."}, {"n": 72, "type": "single", "q": "Какой метод вызывается при активации объекта?", "code": "", "opts": [{"t": "Start()", "c": false}, {"t": "OnEnable()", "c": true}, {"t": "Awake()", "c": false}, {"t": "Update()", "c": false}], "theory": "При активации (включении) объекта вызывается OnEnable(). Awake() и Start() срабатывают при создании/первом запуске, а Update() — каждый кадр."}, {"n": 73, "type": "single", "q": "Как сделать объект нематериальным (триггер)?", "code": "", "opts": [{"t": "Установить mass", "c": false}, {"t": "Добавить компонент NoCollision", "c": false}, {"t": "Отметить Is Trigger в Collider", "c": true}, {"t": "Увеличить значение Drag у Rigidbody", "c": false}], "theory": "Чтобы сделать объект «нематериальным» триггером, включают Is Trigger у его Collider — он перестаёт блокировать движение, но фиксирует пересечения через OnTrigger-события."}, {"n": 74, "type": "single", "q": "Как объявить публичную переменную в скрипте C# (Unity)?", "code": "", "opts": [{"t": "public float speed;", "c": true}, {"t": "float speed;", "c": false}, {"t": "private float speed;", "c": false}, {"t": "public;", "c": false}], "theory": "Публичная переменная объявляется как public float speed; — она доступна другим скриптам и по умолчанию видна в инспекторе. private скрывает её, а без модификатора переменная по умолчанию приватна."}]</script>
<script>
const QUESTIONS = JSON.parse(document.getElementById('data').textContent);
// shuffle helper
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
// prepare per-question shuffled view
QUESTIONS.forEach(q=>{
  if(q.type==='match'){
    q.shufMatches = shuffle(q.matches);
  } else {
    q.shufOpts = shuffle(q.opts.map((o,i)=>({...o})));
  }
  q.state={checked:false,sel:[],correct:false};
});
let idx=0, score=0, answered=0;
const app=document.getElementById('app');
const prog=document.getElementById('prog');
const counter=document.getElementById('counter');
const scoreLbl=document.getElementById('scoreLbl');
const N=QUESTIONS.length;

function render(){
  if(idx>=N){return renderFinal();}
  const q=QUESTIONS[idx];
  counter.textContent=`Вопрос ${idx+1} из ${N}`;
  scoreLbl.textContent=`Счёт: ${score} / ${answered}`;
  prog.style.width=((idx)/N*100)+'%';
  let h=`<div class="card"><div class="qn">Вопрос ${q.n}</div><div class="q">${esc(q.q)}</div>`;
  if(q.type==='multi') h+=`<div class="hint">Выберите все правильные варианты, затем «Проверить».</div>`;
  if(q.type==='match') h+=`<div class="hint">Для каждого элемента выберите верное соответствие.</div>`;
  if(q.code) h+=`<pre>${esc(q.code)}</pre>`;

  if(q.type==='match'){
    q.shufMatches; // options list
    h+=`<div id="opts">`;
    q.elems.forEach((el,i)=>{
      let selv=q.state.sel[i]||'';
      let cls='mrow';
      if(q.state.checked){cls+= (selv===q.matches[i])?' ok':' bad';}
      h+=`<div class="${cls}"><div class="el">${esc(el)}</div><select data-i="${i}" ${q.state.checked?'disabled':''} onchange="pickMatch(${i},this.value)"><option value="">— выберите —</option>`;
      q.shufMatches.forEach(m=>{h+=`<option ${selv===m?'selected':''} value="${escAttr(m)}">${esc(m)}</option>`;});
      h+=`</select></div>`;
    });
    h+=`</div>`;
  } else {
    const sq=q.type==='multi';
    h+=`<div id="opts">`;
    q.shufOpts.forEach((o,i)=>{
      let cls='opt'+(sq?' sq':'');
      let mark='';
      const chosen=q.state.sel.includes(i);
      if(q.state.checked){
        cls+=' locked';
        if(o.c){cls+=' ok';mark='✓';}
        else if(chosen){cls+=' bad';mark='✕';}
      } else if(chosen){cls+=' sel';mark=sq?'✓':'●';}
      h+=`<div class="${cls}" onclick="pick(${i})"><div class="box">${mark}</div><div>${esc(o.t)}</div></div>`;
    });
    h+=`</div>`;
  }

  // theory
  if(q.state.checked){
    const v=q.state.correct?'<span class="verdict ok">✓ Верно!</span>':'<span class="verdict bad">✕ Неверно</span>';
    h+=`<div class="theory show">${v}<br><b>Теория:</b> ${esc(q.theory)}</div>`;
  } else {
    h+=`<div class="theory"></div>`;
  }

  // buttons
  h+=`<div class="btns">`;
  h+=`<button class="ghost" onclick="prev()" ${idx===0?'disabled':''}>← Назад</button>`;
  if(!q.state.checked){
    h+=`<button class="primary" id="checkBtn" onclick="check()" ${hasSel(q)?'':'disabled'}>Проверить</button>`;
  } else {
    h+=`<button class="primary" onclick="next()">${idx===N-1?'Завершить':'Далее →'}</button>`;
  }
  h+=`</div></div>`;
  app.innerHTML=h;
}
function hasSel(q){
  if(q.type==='match'){return q.elems.every((_,i)=>q.state.sel[i]);}
  return q.state.sel.length>0;
}
function pick(i){
  const q=QUESTIONS[idx];if(q.state.checked)return;
  if(q.type==='multi'){
    const p=q.state.sel.indexOf(i);
    if(p>=0)q.state.sel.splice(p,1);else q.state.sel.push(i);
  } else {
    q.state.sel=[i];
  }
  render();
}
function pickMatch(i,v){
  const q=QUESTIONS[idx];if(q.state.checked)return;
  q.state.sel[i]=v;
  const btn=document.getElementById('checkBtn');
  if(btn)btn.disabled=!hasSel(q);
}
function check(){
  const q=QUESTIONS[idx];
  if(!hasSel(q))return;
  let ok;
  if(q.type==='match'){
    ok=q.elems.every((_,i)=>q.state.sel[i]===q.matches[i]);
  } else {
    const correctIdx=q.shufOpts.map((o,i)=>o.c?i:-1).filter(i=>i>=0).sort();
    const sel=q.state.sel.slice().sort();
    ok=correctIdx.length===sel.length&&correctIdx.every((v,k)=>v===sel[k]);
  }
  q.state.checked=true;q.state.correct=ok;
  answered++;if(ok)score++;
  render();
}
function next(){idx++;render();}
function prev(){if(idx>0){idx--;render();}}
function renderFinal(){
  prog.style.width='100%';
  counter.textContent=`Готово`;scoreLbl.textContent=`Счёт: ${score} / ${answered}`;
  const pct=answered?Math.round(score/answered*100):0;
  let msg = pct>=90?'Отличный результат! 🎯':pct>=70?'Хорошо, но есть что повторить 💪':pct>=50?'Неплохо — стоит закрепить теорию 📚':'Стоит пройти ещё раз и почитать теорию 🔁';
  app.innerHTML=`<div class="card final"><div class="qn">Результат</div>
    <div class="score">${score}<small> / ${N}</small></div>
    <div class="pill">${pct}% правильных</div>
    <p style="color:var(--muted);margin-top:14px">${msg}</p>
    <div class="btns"><button class="ghost" onclick="review()">Посмотреть ответы</button><button class="primary" onclick="restart()">Пройти заново</button></div>
  </div>`;
}
function review(){idx=0;render();}
function restart(){
  QUESTIONS.forEach(q=>{q.state={checked:false,sel:[],correct:false};
    if(q.type==='match')q.shufMatches=shuffle(q.matches);else q.shufOpts=shuffle(q.opts.map(o=>({...o})));});
  idx=0;score=0;answered=0;render();
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function escAttr(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
render();
</script>
